name: Test code

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@cd7d8d697e10461458bc61a30d094dc601a8b017
    - uses: actions/setup-node@v3
      with:
        node-version: 18
    - name: lint
      run: |
        cd javascript-client-generated
        npm i
        npm run lint
    - name: build
      run: |
        cd javascript-client-generated
        npm run build
    - name: test
      run: |
        cd javascript-client-generated
        npm run test 
      env:
        node_env: testing         
